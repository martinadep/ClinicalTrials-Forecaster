services:
  postgres:
    image: postgres:16
    container_name: clinical_trial_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: clinical_trial_adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: clinical_trial_kafka
    ports:
      - "9092:9092"        
      - "29092:29092"      
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: clinical_trial_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "echo 'Waiting for Kafka to be fully ready...' && 
      sleep 5 && 
      echo 'Creating Kafka topics...' && 
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic trials.bronze --partitions 3 --replication-factor 1 && 
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic trials.silver --partitions 3 --replication-factor 1 && 
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic sites.silver --partitions 3 --replication-factor 1 && 
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic mesh.gold --partitions 3 --replication-factor 1 && 
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic trials.gold --partitions 3 --replication-factor 1 && 
      echo 'Topics created. Current list:' && 
      kafka-topics --bootstrap-server kafka:29092 --list"

  kafdrop:
    image: obsidiandynamics/kafdrop
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
    depends_on:
      - kafka

  spark:
    build: 
      context: .
      dockerfile: Dockerfile.spark
    container_name: clinical_trial_spark
    user: root
    working_dir: /app
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC_BRONZE: trials.bronze
      KAFKA_TOPIC_SILVER: trials.silver
      POSTGRES_HOST: clinical_trial_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
    volumes:
      - .:/app
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: tail -f /dev/null

  # =========================================================================
  # CONSUMERS 
  # =========================================================================

  consumer-bronze:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: clinical_trial_consumer_bronze
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_BROKER=kafka:29092
      - KAFKA_TOPIC_BRONZE=trials.bronze
      - POSTGRES_HOST=clinical_trial_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command: python kafka_consumers/consumer_bronze.py
  consumer-silver-trials:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: clinical_trial_consumer_silver_trials
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_BROKER=kafka:29092
      - POSTGRES_HOST=clinical_trial_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command: python kafka_consumers/consumer_silver_trials.py
  consumer-silver-sites:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: clinical_trial_consumer_silver_sites
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_BROKER=kafka:29092
      - POSTGRES_HOST=clinical_trial_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command: python kafka_consumers/consumer_silver_sites.py
  consumer-gold-mesh:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: clinical_trial_consumer_gold_mesh
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_BROKER=kafka:29092
      - POSTGRES_HOST=clinical_trial_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command: python kafka_consumers/consumer_gold_mesh.py
    
  consumer-gold:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: clinical_trial_consumer_gold
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_BROKER=kafka:29092
      - KAFKA_TOPIC_GOLD_FEATURES=trials.gold
      - POSTGRES_HOST=clinical_trial_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command: python kafka_consumers/consumer_gold.py

  # =========================================================================
  # ML SERVING + DASHBOARD
  # =========================================================================

  ml-api:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: clinical_trial_ml_api
    user: root
    working_dir: /app
    environment:
      PYTHONPATH: /app:/opt/spark/python:/opt/spark/python/lib/py4j-0.10.9.7-src.zip
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 15
    command: uvicorn models.ml_api:app --host 0.0.0.0 --port 8000

  dashboard:
    build: 
      context: .
      dockerfile: Dockerfile.python
    container_name: clinical_trial_dashboard
    working_dir: /app
    environment:
      PYTHONPATH: /app
      ML_API_URL: http://ml-api:8000
      POSTGRES_HOST: clinical_trial_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      ml-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')\""]
      interval: 15s
      timeout: 5s
      retries: 50
      start_period: 60s
    command: bash -c "python -m dashboard.retrieve_data && streamlit run dashboard/app.py --server.address=0.0.0.0"


volumes:
  postgres_data:
    name: postgres_data
  kafka_data:
    name: kafka_data