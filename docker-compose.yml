services:
  postgres:
    image: postgres:16
    container_name: clinical_trial_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 10

  adminer:
    image: adminer
    container_name: clinical_trial_adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: clinical_trial_kafka
    ports:
      - "9092:9092"        # for clients on your host machine
      - "29092:29092"      # for other docker containers
    environment:
      # KRaft mode settings (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      # Single-broker setup (project, not production)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: clinical_trial_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic trials.bronze --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic trials.silver --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic trials.gold --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic trials.forecasts --partitions 3 --replication-factor 1
      echo 'Topics created. Current list:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
  kafdrop:
    image: obsidiandynamics/kafdrop
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
    depends_on:
      - kafka

  spark:
    image: apache/spark:3.5.1
    container_name: clinical_trial_spark
    user: root
    working_dir: /app
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC_BRONZE: trials.bronze
      KAFKA_TOPIC_SILVER: trials.silver
      POSTGRES_HOST: clinical_trial_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
    volumes:
      - .:/app
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # Local mode (no separate master/worker cluster): the base image's pip is too old
    # to resolve manylinux wheels, so upgrade it, then install the DB/Kafka client
    # libs the ETL jobs need plus numpy/pandas (required by pyspark.ml for the
    # models/train.py, models/predict.py Spark MLlib scripts; not bundled in the
    # base image), then stay up so jobs can be triggered with
    # `docker exec clinical_trial_spark spark-submit ...`.
    command: >
      bash -c "pip3 install --upgrade pip && pip3 install --no-cache-dir psycopg2-binary==2.9.10 confluent-kafka==2.3.0 numpy pandas && tail -f /dev/null"

volumes:
  postgres_data:
    name: postgres_data
  kafka_data:
    name: kafka_data